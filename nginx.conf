load_module modules/ngx_http_js_module.so;

events {}

http {
    js_engine qjs;
    js_path "/etc/nginx/njs/";
    js_import auth from auth.js;

    js_shared_dict_zone zone=authsess:1m timeout=86400s;
    js_shared_dict_zone zone=authchal:1m timeout=300s;

    # ===== Example: protect selected locations with js_access =====
    server {
        listen 443 ssl;
        server_name example.com;

        location ^~ /auth/ {
            client_max_body_size 16k;
            js_content auth.route;
        }

        # public endpoints (no auth)
        location = /generate_204 { return 204; }
        location = /ncsi.txt     { return 200 "Microsoft NCSI"; }

        location / {
            js_access auth.access;
            js_header_filter auth.refresh;
            root /usr/share/nginx/html;
            try_files $uri /index.html;
        }
    }
}
